# Validates widget submissions on every PR by building the catalog from the
# PR's OWN sources. Because it builds builder/ from the branch (rather than
# pulling the published image), changes to the builder or the manifest schema
# are exercised by the check too. The builder exits non-zero on any invalid
# manifest, oversized widget, duplicate id, or missing cover.png/README.md, so
# a failed build is a failed check.
name: PR Docker Build Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Only needs to read the repo: it builds locally and pushes nothing.
permissions:
  contents: read

# Supersede stale runs for the same PR.
concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

env:
  # Tag the locally built image to match docker-compose's `image:` so the run
  # step below uses exactly this freshly built image (no pull, no rebuild).
  BUILDER_IMAGE: ghcr.io/beyond-all-reason/bar-workshop-builder:latest
  MAX_WIDGET_SIZE_BYTES: 5242880 # 5 MiB

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image from PR sources
        uses: docker/build-push-action@v6
        with:
          context: .
          file: builder/Dockerfile
          load: true
          tags: ${{ env.BUILDER_IMAGE }}
          # Shared with the publish and builder-image workflows, so the npm ci
          # layer is restored from cache instead of rebuilt.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate widgets
        run: docker compose run --rm builder
