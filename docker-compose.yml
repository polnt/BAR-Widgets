services:
  builder: # use: docker compose run --rm builder
    container_name: bar-workshop-builder
    image: ghcr.io/beyond-all-reason/bar-workshop-builder:latest
    build:
      context: .
      dockerfile: builder/Dockerfile
    volumes:
      - ./build:/app/build
      - ./Widgets:/app/Widgets:ro # the builder only reads widgets; it writes to build/
    environment:
      - MAX_WIDGET_SIZE_BYTES=${MAX_WIDGET_SIZE_BYTES:-5242880} # 5 MiB
    profiles: ['tool'] # we don't want to run this with docker compose up
